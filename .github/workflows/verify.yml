name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck, Lint, Format, Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so npm ci can fetch @venturecrane/crane-test-harness from
      # GitHub Packages via the workflow's GITHUB_TOKEN.
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@venturecrane'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck Workers
        run: npm run typecheck:workers

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # The root build writes `.wrangler/deploy/config.json` pointing at the
      # adapter-generated `dist/server/wrangler.json`. Leaving it in the tree
      # makes sub-worker `wrangler deploy` invocations ambiguous because
      # wrangler discovers both the sub-worker's own `wrangler.toml` and the
      # root's deploy config. Remove it before the sub-worker steps.
      - name: Clean root wrangler state
        run: rm -rf .wrangler

      - name: Build Job Monitor Worker
        run: cd workers/job-monitor && npm ci && npx wrangler deploy --dry-run --outdir=dist

      - name: Build New Business Worker
        run: cd workers/new-business && npm ci && npx wrangler deploy --dry-run --outdir=dist

      - name: Build Review Mining Worker
        run: cd workers/review-mining && npm ci && npx wrangler deploy --dry-run --outdir=dist

      # NOTE: workers/social-listening is not built or deployed here. It has
      # never been deployed to prod — CI-verifying undeployed code creates
      # false confidence and masks drift. See venture-tracked issue for
      # Pipeline 4 first-deploy (secrets provisioning, dry-run via /run,
      # digest-routing review). Re-add the build step when that issue ships.

  d1-migration-smoke:
    # Live D1 apply against a fresh local DB. Static-source assertions in the
    # test suite (e.g. tests/outside-view-pr-a.test.ts) caught zero of the
    # actual issues with the original migration 0033 — it failed twice in
    # production deploys with FOREIGN KEY constraint failed despite the
    # PR's tests passing. This job runs the migrations end-to-end against a
    # real wrangler --local D1 and asserts behavioral invariants:
    #   - prospect role insert succeeds (the original up's CHECK widening)
    #   - FK joins still return data (FKs preserved through the dance)
    #   - PRAGMA foreign_key_check returns no violations
    name: D1 migration apply (live local)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@venturecrane'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Apply all migrations to fresh local D1
        run: npx wrangler d1 migrations apply ss-console-db --local

      - name: Seed FK-bearing rows (organization, user, session, magic_link)
        run: |
          # organizations requires id, name, AND slug (NOT NULL UNIQUE)
          npx wrangler d1 execute ss-console-db --local --command "INSERT INTO organizations (id, name, slug) VALUES ('test-org', 'Test Org', 'test-org');"
          npx wrangler d1 execute ss-console-db --local --command "INSERT INTO users (id, org_id, email, name, role) VALUES ('test-admin', 'test-org', 'a@x.test', 'A', 'admin');"
          npx wrangler d1 execute ss-console-db --local --command "INSERT INTO sessions (id, token, user_id, org_id, role, email, expires_at) VALUES ('s1', 'tok1', 'test-admin', 'test-org', 'admin', 'a@x.test', '2030-01-01');"
          npx wrangler d1 execute ss-console-db --local --command "INSERT INTO magic_links (id, org_id, user_id, email, token, expires_at) VALUES ('m1', 'test-org', 'test-admin', 'a@x.test', 'mtok1', '2030-01-01');"

      - name: Assert prospect insert succeeds
        run: |
          npx wrangler d1 execute ss-console-db --local --command "INSERT INTO users (id, org_id, email, name, role) VALUES ('test-prospect', 'test-org', 'p@x.test', 'P', 'prospect');"
          # Will exit non-zero if the row didn't land
          npx wrangler d1 execute ss-console-db --local --command "SELECT id, role FROM users WHERE id = 'test-prospect' AND role = 'prospect';" --json | tee /tmp/prospect-row.json
          test "$(jq '.[0].results | length' /tmp/prospect-row.json)" = "1"

      - name: Assert FK joins still return data
        run: |
          npx wrangler d1 execute ss-console-db --local --command "SELECT COUNT(*) AS n FROM sessions s JOIN users u ON s.user_id = u.id WHERE s.id = 's1';" --json | tee /tmp/sessions-fk.json
          test "$(jq '.[0].results[0].n' /tmp/sessions-fk.json)" = "1"
          npx wrangler d1 execute ss-console-db --local --command "SELECT COUNT(*) AS n FROM magic_links m JOIN users u ON m.user_id = u.id WHERE m.id = 'm1';" --json | tee /tmp/magic-fk.json
          test "$(jq '.[0].results[0].n' /tmp/magic-fk.json)" = "1"

      - name: Assert PRAGMA foreign_key_check returns no violations
        run: |
          npx wrangler d1 execute ss-console-db --local --command "PRAGMA foreign_key_check;" --json | tee /tmp/fk-check.json
          # Empty results array = clean. Non-empty = FK violations exist; fail.
          test "$(jq '.[0].results | length' /tmp/fk-check.json)" = "0"
